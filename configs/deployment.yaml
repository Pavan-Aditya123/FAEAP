# Deployment Configuration
deployment:
  environment: "production"  # development, staging, production
  strategy: "kubernetes"  # kubernetes, docker-compose, bare-metal

# Docker Configuration
docker:
  registry: "docker.io"
  image_name: "faeap"
  tag: "latest"
  build_context: "."
  dockerfile: "Dockerfile"

# Kubernetes Configuration
kubernetes:
  namespace: "faeap"
  replicas:
    backend: 3
    frontend: 2
    ai_service: 2
  resources:
    backend:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    frontend:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    ai_service:
      requests:
        cpu: "2000m"
        memory: "4Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "4000m"
        memory: "8Gi"
        nvidia.com/gpu: "1"

# Ingress Configuration
ingress:
  enabled: true
  host: "faeap.example.com"
  tls:
    enabled: true
    secret_name: "faeap-tls"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
    port: 3000
  loki:
    enabled: true
    port: 3100

# Autoscaling Configuration
autoscaling:
  enabled: true
  min_replicas: 2
  max_replicas: 10
  target_cpu_utilization: 70
  target_memory_utilization: 80

# Health Check Configuration
health_check:
  enabled: true
  liveness_probe:
    path: "/health"
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
  readiness_probe:
    path: "/ready"
    initial_delay_seconds: 10
    period_seconds: 5
    timeout_seconds: 3
    failure_threshold: 3

# Backup Configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 30
  destinations:
    - type: "s3"
      bucket: "faeap-backup"
      region: "us-east-1"
